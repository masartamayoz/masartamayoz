<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ملفي الشخصي — أكاديمية مسار التميز</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{--blue-dark:#0a1628;--blue-mid:#0d2147;--blue-light:#2563eb;--gold:#f59e0b;--gold-light:#fbbf24;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-400:#94a3b8;--gray-600:#475569;--gray-800:#1e293b;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--purple:#8b5cf6}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Tajawal',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh}
    a{text-decoration:none;color:inherit}
    #loadingScreen{position:fixed;inset:0;background:var(--blue-dark);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
    .loader-ring{width:52px;height:52px;border:4px solid rgba(255,255,255,.1);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loadingScreen p{color:rgba(255,255,255,.7);font-size:.9rem}

    /* TOPBAR */
    .topbar{background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50}
    .topbar-back{background:rgba(255,255,255,.1);border:none;color:white;width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;transition:all .2s;flex-shrink:0}
    .topbar-back:hover{background:rgba(255,255,255,.2)}
    .topbar-title{font-size:1rem;font-weight:800;color:white;flex:1}
    .topbar-logo{display:flex;align-items:center;gap:10px;margin-right:auto}
    .topbar-logo img{width:36px;height:36px;border-radius:8px;background:white;padding:3px;object-fit:contain}
    .topbar-logo span{font-size:.85rem;font-weight:700;color:rgba(255,255,255,.85)}

    /* MAIN */
    .main{max-width:720px;margin:0 auto;padding:28px 20px}

    /* PROFILE CARD */
    .profile-hero{background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));border-radius:20px;padding:28px;display:flex;align-items:center;gap:20px;margin-bottom:20px;flex-wrap:wrap}
    .avatar-wrapper{position:relative;flex-shrink:0}
    .avatar{width:84px;height:84px;border-radius:50%;background:var(--gold);color:var(--blue-dark);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900;border:4px solid rgba(255,255,255,.2);overflow:hidden;cursor:pointer}
    .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .avatar-edit{position:absolute;bottom:0;left:0;width:26px;height:26px;background:var(--blue-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:white;cursor:pointer;border:2px solid white}
    .profile-info h2{font-size:1.2rem;font-weight:800;color:white;margin-bottom:4px}
    .profile-info p{font-size:.82rem;color:rgba(255,255,255,.6)}
    .role-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:700;margin-top:8px}
    .sub-status{margin-right:auto;text-align:center}
    .sub-status .sub-label{font-size:.72rem;color:rgba(255,255,255,.5);margin-bottom:4px}
    .sub-pill{padding:6px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
    .sub-active{background:rgba(16,185,129,.2);color:#34d399}
    .sub-inactive{background:rgba(239,68,68,.2);color:#f87171}

    /* CARDS */
    .card{background:white;border:1px solid var(--gray-200);border-radius:16px;padding:24px;margin-bottom:16px}
    .card-title{font-size:.95rem;font-weight:800;color:var(--blue-dark);margin-bottom:20px;display:flex;align-items:center;gap:10px}
    .card-title i{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}

    /* FORM */
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:.82rem;font-weight:700;color:var(--gray-600);margin-bottom:6px}
    .form-control{width:100%;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:10px;font-family:inherit;font-size:.9rem;background:var(--gray-50);transition:all .2s;outline:none;color:var(--gray-800)}
    .form-control:focus{border-color:var(--blue-light);background:white;box-shadow:0 0 0 3px rgba(37,99,235,.08)}
    .form-control:disabled{background:var(--gray-100);color:var(--gray-400);cursor:not-allowed}
    .input-wrapper{position:relative}
    .input-wrapper .form-control{padding-left:40px}
    .input-toggle{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:.85rem}
    .input-toggle:hover{color:var(--blue-light)}

    /* LEVEL SELECTOR */
    .level-btns{display:flex;gap:8px}
    .level-btn{flex:1;padding:10px;border:1.5px solid var(--gray-200);border-radius:10px;background:var(--gray-50);font-family:inherit;font-size:.85rem;font-weight:700;color:var(--gray-600);cursor:pointer;transition:all .2s}
    .level-btn.active{border-color:var(--blue-light);background:rgba(37,99,235,.08);color:var(--blue-light)}
    .level-btn:disabled{opacity:.4;cursor:not-allowed}

    /* BUTTONS */
    .btn{padding:10px 22px;border-radius:10px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
    .btn-primary{background:var(--blue-light);color:white}
    .btn-primary:hover{background:#1d4ed8;transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .btn-danger{background:rgba(239,68,68,.1);color:var(--danger);border:1.5px solid rgba(239,68,68,.2)}
    .btn-danger:hover{background:var(--danger);color:white}
    .btn-outline{background:white;color:var(--gray-600);border:1.5px solid var(--gray-200)}
    .btn-outline:hover{border-color:var(--blue-light);color:var(--blue-light)}
    .btn-row{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:4px}

    /* DANGER ZONE */
    .danger-zone{border:1.5px solid rgba(239,68,68,.2);border-radius:16px;padding:20px}
    .danger-zone .card-title{color:var(--danger)}
    .danger-item{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--gray-100);gap:12px;flex-wrap:wrap}
    .danger-item:last-child{border-bottom:none;padding-bottom:0}
    .danger-item-info h4{font-size:.88rem;font-weight:700;color:var(--gray-800);margin-bottom:3px}
    .danger-item-info p{font-size:.78rem;color:var(--gray-400)}

    /* INFO ITEMS */
    .info-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100);gap:12px}
    .info-item:last-child{border-bottom:none}
    .info-label{font-size:.82rem;color:var(--gray-600)}
    .info-value{font-size:.88rem;font-weight:600;color:var(--gray-800)}

    /* TOAST */
    #toastContainer{position:fixed;bottom:20px;left:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
    .toast{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:12px;font-size:.87rem;font-weight:600;color:white;box-shadow:0 4px 16px rgba(0,0,0,.18);animation:toastIn .3s ease;min-width:220px}
    @keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .toast-success{background:var(--success)}.toast-danger{background:var(--danger)}.toast-warning{background:var(--warning);color:var(--blue-dark)}.toast-info{background:var(--blue-light)}

    @media(max-width:600px){.form-row{grid-template-columns:1fr}.profile-hero{flex-direction:column;text-align:center}.sub-status{margin-right:0}}
  </style>
</head>
<body>

<div id="loadingScreen"><div class="loader-ring"></div><p>جاري التحميل...</p></div>

<div id="appContainer" style="display:none">

  <!-- TOPBAR -->
  <div class="topbar">
    <button class="topbar-back" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-right"></i></button>
    <div class="topbar-title">ملفي الشخصي</div>
    <div class="topbar-logo">
      <img src="assets/logo.png" alt="مسار التميز" onerror="this.style.display='none'">
      <span>مسار التميز</span>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- Profile Hero -->
    <div class="profile-hero">
      <div class="avatar-wrapper">
        <div class="avatar" id="profileAvatar">؟</div>
        <div class="avatar-edit"><i class="fas fa-camera"></i></div>
      </div>
      <div class="profile-info">
        <h2 id="profileName">—</h2>
        <p id="profileEmail">—</p>
        <div class="role-badge" id="profileRoleBadge"></div>
      </div>
      <div class="sub-status">
        <div class="sub-label">حالة الاشتراك</div>
        <div class="sub-pill" id="profileSubPill">—</div>
      </div>
    </div>

    <!-- البيانات الشخصية -->
    <div class="card">
      <div class="card-title">
        <i class="fas fa-user" style="background:rgba(37,99,235,.1);color:var(--blue-light)"></i>
        البيانات الشخصية
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>الاسم</label>
          <input type="text" class="form-control" id="editFirstName">
        </div>
        <div class="form-group">
          <label>اللقب</label>
          <input type="text" class="form-control" id="editLastName">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" class="form-control" id="editEmail" disabled>
        </div>
        <div class="form-group">
          <label>رقم الهاتف</label>
          <input type="tel" class="form-control" id="editPhone" placeholder="2X XXX XXX">
        </div>
      </div>
      <div class="form-group" id="levelSection" style="display:none">
        <label>المستوى الدراسي</label>
        <div class="level-btns">
          <button class="level-btn" id="lvl7" onclick="setLevel('7',this)">السنة 7</button>
          <button class="level-btn" id="lvl8" onclick="setLevel('8',this)">السنة 8</button>
          <button class="level-btn" id="lvl9" onclick="setLevel('9',this)">السنة 9</button>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="saveProfileBtn" onclick="saveProfile()">
          <i class="fas fa-save"></i> حفظ التغييرات
        </button>
      </div>
    </div>

    <!-- تغيير كلمة المرور -->
    <div class="card">
      <div class="card-title">
        <i class="fas fa-lock" style="background:rgba(245,158,11,.1);color:var(--gold)"></i>
        تغيير كلمة المرور
      </div>
      <div class="form-group">
        <label>كلمة المرور الجديدة</label>
        <div class="input-wrapper">
          <input type="password" class="form-control" id="newPassword" placeholder="6 أحرف على الأقل">
          <button class="input-toggle" onclick="togglePass('newPassword',this)"><i class="fas fa-eye-slash"></i></button>
        </div>
      </div>
      <div class="form-group">
        <label>تأكيد كلمة المرور</label>
        <div class="input-wrapper">
          <input type="password" class="form-control" id="confirmPassword" placeholder="أعد كتابة كلمة المرور">
          <button class="input-toggle" onclick="togglePass('confirmPassword',this)"><i class="fas fa-eye-slash"></i></button>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="changePassword()">
          <i class="fas fa-key"></i> تغيير كلمة المرور
        </button>
      </div>
    </div>

    <!-- معلومات الحساب -->
    <div class="card">
      <div class="card-title">
        <i class="fas fa-info-circle" style="background:rgba(16,185,129,.1);color:var(--success)"></i>
        معلومات الحساب
      </div>
      <div class="info-item">
        <span class="info-label">نوع الحساب</span>
        <span class="info-value" id="infoRole">—</span>
      </div>
      <div class="info-item" id="infoLevelRow" style="display:none">
        <span class="info-label">المستوى الدراسي</span>
        <span class="info-value" id="infoLevel">—</span>
      </div>
      <div class="info-item">
        <span class="info-label">حالة الاشتراك</span>
        <span class="info-value" id="infoSub">—</span>
      </div>
      <div class="info-item">
        <span class="info-label">تاريخ التسجيل</span>
        <span class="info-value" id="infoDate">—</span>
      </div>
    </div>

    <!-- منطقة الخطر -->
    <div class="danger-zone">
      <div class="card-title" style="margin-bottom:14px">
        <i class="fas fa-exclamation-triangle" style="background:rgba(239,68,68,.1);color:var(--danger)"></i>
        منطقة الخطر
      </div>
      <div class="danger-item">
        <div class="danger-item-info">
          <h4>تسجيل الخروج</h4>
          <p>الخروج من حسابك على هذا الجهاز</p>
        </div>
        <button class="btn btn-outline" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
      </div>
    </div>

  </div>
</div>

<div id="toastContainer"></div>

<script type="module">
  import { initializeApp }  from 'https://www.gstatic.com/firebasejs/9.6.0/firebase-app.js';
  import { getAuth, onAuthStateChanged, signOut, updatePassword, reauthenticateWithCredential, EmailAuthProvider }
    from 'https://www.gstatic.com/firebasejs/9.6.0/firebase-auth.js';
  import { getFirestore, doc, getDoc, updateDoc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAF_ktwHXPw6gDkoolCI77XeB_NGHTmAFA",
    authDomain: "masartamayoz.firebaseapp.com",
    projectId: "masartamayoz",
    storageBucket: "masartamayoz.firebasestorage.app",
    messagingSenderId: "589955939618",
    appId: "1:589955939618:web:728ddeb7027b2becd1f97b"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  const $    = id => document.getElementById(id);

  const ROLES  = {student:'تلميذ',parent:'ولي أمر',teacher:'مربي',admin:'مدير'};
  const LEVELS = {7:'السنة السابعة',8:'السنة الثامنة',9:'السنة التاسعة'};
  const ROLE_COLORS = {
    student:'background:rgba(16,185,129,.2);color:#6ee7b7',
    parent: 'background:rgba(37,99,235,.2);color:#93c5fd',
    teacher:'background:rgba(245,158,11,.2);color:#fcd34d',
    admin:  'background:rgba(239,68,68,.2);color:#fca5a5',
  };

  let CU = null, CUD = null, selectedLevel = '';

  function toast(msg, type='info') {
    const c = $('toastContainer');
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    const icons={success:'check-circle',danger:'exclamation-circle',warning:'exclamation-triangle',info:'info-circle'};
    t.innerHTML = `<i class="fas fa-${icons[type]}"></i> ${msg}`;
    c.appendChild(t);
    setTimeout(()=>{t.style.cssText='opacity:0;transition:opacity .3s';setTimeout(()=>t.remove(),300);},3200);
  }

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = 'auth.html'; return; }
    CU = user;
    const snap = await getDoc(doc(db,'users',user.uid));
    if (!snap.exists()) { window.location.href = 'auth.html'; return; }
    CUD = snap.data();
    populateProfile();
    $('loadingScreen').style.display = 'none';
    $('appContainer').style.display  = 'block';
  });

  function populateProfile() {
    const name = CUD.firstName ? `${CUD.firstName} ${CUD.lastName||''}`.trim() : (CU.displayName||CU.email);
    const initial = name.charAt(0).toUpperCase();
    $('profileAvatar').innerHTML = CU.photoURL
      ? `<img src="${CU.photoURL}" alt="avatar">`
      : initial;
    $('profileName').textContent  = name;
    $('profileEmail').textContent = CU.email;
    $('profileRoleBadge').setAttribute('style', ROLE_COLORS[CUD.userType]||'');
    $('profileRoleBadge').innerHTML = `<i class="fas fa-user"></i> ${ROLES[CUD.userType]||CUD.userType}`;

    const isActive = CUD.subscriptionStatus === 'active';
    $('profileSubPill').className = `sub-pill ${isActive?'sub-active':'sub-inactive'}`;
    $('profileSubPill').textContent = isActive ? '✅ مفعّل' : '❌ غير مفعّل';

    // Form fields
    $('editFirstName').value = CUD.firstName||'';
    $('editLastName').value  = CUD.lastName||'';
    $('editEmail').value     = CU.email||'';
    $('editPhone').value     = CUD.phone||'';

    // Level for students
    if (CUD.userType === 'student') {
      $('levelSection').style.display   = 'block';
      $('infoLevelRow').style.display   = 'flex';
      selectedLevel = CUD.level||'7';
      const lvlBtn = $(`lvl${selectedLevel}`);
      if (lvlBtn) lvlBtn.classList.add('active');
      $('infoLevel').textContent = LEVELS[parseInt(selectedLevel)] || `السنة ${selectedLevel}`;
    }

    $('infoRole').textContent = ROLES[CUD.userType]||CUD.userType;
    $('infoSub').textContent  = isActive ? '✅ مفعّل' : '❌ غير مفعّل';
    $('infoDate').textContent = CUD.createdAt?.toDate
      ? CUD.createdAt.toDate().toLocaleDateString('ar-TN')
      : '—';
  }

  window.setLevel = function(level, btn) {
    selectedLevel = level;
    document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  };

  window.togglePass = function(id, btn) {
    const input = $(id);
    const isPass = input.type==='password';
    input.type = isPass?'text':'password';
    btn.querySelector('i').className = isPass?'fas fa-eye':'fas fa-eye-slash';
  };

  window.saveProfile = async function() {
    const firstName = $('editFirstName').value.trim();
    const lastName  = $('editLastName').value.trim();
    const phone     = $('editPhone').value.trim();
    if (!firstName||!lastName) { toast('الاسم واللقب مطلوبان','warning'); return; }
    const btn = $('saveProfileBtn');
    btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
    try {
      const updates = { firstName, lastName, phone };
      if (CUD.userType==='student' && selectedLevel) updates.level = selectedLevel;
      await updateDoc(doc(db,'users',CU.uid), updates);
      CUD = {...CUD,...updates};
      $('profileName').textContent = `${firstName} ${lastName}`;
      $('profileAvatar').textContent = firstName.charAt(0).toUpperCase();
      toast('تم حفظ البيانات بنجاح','success');
    } catch(e) { toast('خطأ: '+e.message,'danger'); }
    finally { btn.disabled=false; btn.innerHTML='<i class="fas fa-save"></i> حفظ التغييرات'; }
  };

  window.changePassword = async function() {
    const newPass  = $('newPassword').value;
    const confPass = $('confirmPassword').value;
    if (!newPass||!confPass) { toast('يرجى إدخال كلمة المرور الجديدة','warning'); return; }
    if (newPass.length<6)    { toast('كلمة المرور ضعيفة — 6 أحرف على الأقل','warning'); return; }
    if (newPass!==confPass)  { toast('كلمتا المرور غير متطابقتين','warning'); return; }
    try {
      await updatePassword(CU, newPass);
      $('newPassword').value=''; $('confirmPassword').value='';
      toast('تم تغيير كلمة المرور بنجاح','success');
    } catch(err) {
      if (err.code==='auth/requires-recent-login')
        toast('يرجى تسجيل الخروج والدخول مجدداً ثم المحاولة','warning');
      else toast('خطأ: '+err.message,'danger');
    }
  };

  window.doLogout = async function() {
    await signOut(auth);
    window.location.href = 'auth.html';
  };
</script>
</body>
</html>
